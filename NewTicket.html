<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Ticket</title>
    <link rel="stylesheet" href="styling.css">
    <link rel="stylesheet" href="TicketStyling.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <div class="Header">
        <div class="HeaderTitle">
            <h3>Create New Ticket</h3>
        </div>
        <button id="backButton" class="button" onclick="window.location.href='index.html'">Go Back</button>
    </div> 
    <div>
        <form id="newTicketForm" class="ticketForm">
            <div class="personIDDiv">
                <label for="personID">Person ID:</label>
                <input type="text" id="personID" required>
            </div>
            <div class="personEmailDiv">
                <label for="personEmail">Person Email:</label>
                <input type="email" id="personEmail" required>
            </div>
            <div class="personUsernameDiv">
                <label for="personUsername">Person Username:</label>
                <input type="text" id="personUsername" required>
            </div>
            <div class="summaryDiv">
                <label for="summary">Summary:</label>
                <input type="text" id="summary" required>
            </div>
            <div class="descriptionDiv">
                <label for="description">Description:</label>
                <textarea id="description" required></textarea>
            </div>
            <div class="personDiv">
                <label for="person">Identified by:</label>
                <input type="text" id="person" required>
            </div>
            <div class="projectDiv">
                <label for="projectID">Project ID:</label>
                <input type="text" id="projectID" required>
            </div>
            <div class="projectNameDiv">
                <label for="projectName">Project Name:</label>
                <input type="text" id="projectName" required>
            </div>
            <div class="priorityDiv">
                <label for="priority">Priority:</label>
                <select id="priority" required>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="targetDateDiv">
                <label for="targetDate">Target Date:</label>
                <input type="date" id="targetDate" required>
            </div>
            <div class="personNameDiv">
                <label for="personName">Assigned Name:</label>
                <input type="text" id="personName" required>
            </div>
            <div class="personSurnameDiv">
                <label for="personSurname">Assigned Surname:</label>
                <input type="text" id="personSurname" required>
            </div>            
            <div class="submitDiv">
                <button type="submit" class="button" onclick="saveBug()">Create Ticket</button>
            </div>
        </form>
    </div>
</body>
</html>
